// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    // CRITICAL: Set minSdkVersion FIRST before anything else
    // This ensures CMake reads the correct value
    project.ext.set("minSdkVersion", 24)
    System.setProperty("ANDROID_MIN_SDK_VERSION", "24")
    
    ext {
        // compileSdk 35+: required by androidx.camera 1.5.x (expo-camera / ML Kit vision)
        buildToolsVersion = "35.0.0"
        minSdkVersion = 24  // RN 0.83+ requires 24 (react-android AAR manifest)
        compileSdkVersion = 35
        targetSdkVersion = 35
        // RN 0.83+ uses std::format in C++; requires NDK r27+ libc++ (r26 fails on Windows/ARM builds)
        ndkVersion = "27.2.12479018"
        // 2.1.20+ required for expo-root-project / KSP (1.9.x is unsupported)
        kotlinVersion = "2.1.20"
        kotlin_version = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.3.0")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
    }
}

allprojects {
    repositories {
        maven {
            // All of React Native (JS, Obj-C sources, Android binaries) is installed from npm
            url("$rootDir/../node_modules/react-native/android")
        }
        maven {
            // Android JSC is installed from npm
            url("$rootDir/../node_modules/jsc-android/dist")
        }
        google()
        mavenCentral()
    }
    
    // Force compatible androidx.core version (1.17.0 requires AGP 8.9.1+, downgrade to 1.13.0)
    configurations.all {
        resolutionStrategy {
            force 'androidx.core:core:1.13.0'
            force 'androidx.core:core-ktx:1.13.0'
        }
    }
    
    // Configure Kotlin compiler globally to suppress internal API errors
    afterEvaluate { project ->
        tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
            kotlinOptions {
                jvmTarget = "17"
                freeCompilerArgs += [
                    "-Xopt-in=kotlin.RequiresOptIn",
                    "-Xsuppress-version-warnings",
                    "-Xallow-unstable-dependencies",
                    "-Xskip-prerelease-check"
                    // NOTE: Do NOT add -Xjvm-default=all here — it removes $DefaultImpls
                    // from Kotlin interfaces, which crashes expo-file-system at runtime.
                ]
                allWarningsAsErrors = false
            }
        }
        
        // Align all Android subprojects with minSdk 24 (RN 0.83+)
        if (project.hasProperty('android')) {
            project.android {
                afterEvaluate {
                    defaultConfig {
                        minSdkVersion 24
                    }
                }
                defaultConfig {
                    minSdkVersion 24
                }
                if (project.name == 'react-native-screens') {
                    afterEvaluate {
                        defaultConfig {
                            minSdkVersion 24
                            externalNativeBuild {
                                cmake {
                                    arguments "-DANDROID_STL=c++_shared",
                                            "-DRNS_NEW_ARCH_ENABLED=${project.hasProperty('newArchEnabled') ? project.newArchEnabled : 'false'}",
                                            "-DANDROID_PLATFORM=android-24",
                                            "-DANDROID_MIN_SDK_VERSION=24"
                                }
                            }
                        }
                    }
                    defaultConfig {
                        minSdkVersion 24
                        externalNativeBuild {
                            cmake {
                                arguments "-DANDROID_STL=c++_shared",
                                        "-DRNS_NEW_ARCH_ENABLED=${project.hasProperty('newArchEnabled') ? project.newArchEnabled : 'false'}",
                                        "-DANDROID_PLATFORM=android-24",
                                        "-DANDROID_MIN_SDK_VERSION=24"
                            }
                        }
                    }
                }
            }
        }
        
        // Fix NDK source.properties issue for react-native-worklets-core
        if (project.name == 'react-native-worklets-core') {
            if (project.hasProperty('android')) {
                project.android {
                    ndkVersion rootProject.ext.ndkVersion
                }
            }
        }
    }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
