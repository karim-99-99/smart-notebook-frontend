apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

react {
    /* Folders */
    root = file("../../")
    reactNativeDir = file("../../node_modules/react-native")
    codegenDir = file("../../node_modules/@react-native/codegen")
}

def enableProguardInReleaseBuilds = false
def jscFlavor = 'org.webkit:android-jsc:+'

android {
    ndkVersion rootProject.ext.ndkVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.smartnotebook"

    defaultConfig {
        applicationId "com.smartnotebook"
        minSdkVersion 23  // Must be 23 for React Native 0.74 - hardcoded to ensure CMake compatibility
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        // Build for 32-bit ARM only - most ARM64 devices support it
        ndk {
            abiFilters 'armeabi-v7a'
        }
        // Use localhost for USB debugging (adb reverse). For WiFi, set your PC's IP in gradle.properties
        buildConfigField "String", "PACKAGER_HOSTNAME", "\"localhost\""
    }
    
    // Ensure all build variants use minSdkVersion 23
    buildTypes.all {
        // This ensures consistency across all build types
    }

    packagingOptions {
        jniLibs {
            // Set to true for 16KB page size compatibility
            useLegacyPackaging = true
        }
    }

    buildTypes {
        debug {
            // Use localhost for USB (adb reverse). For WiFi debugging, set REACT_NATIVE_PACKAGER_HOSTNAME in gradle.properties
            resValue "string", "react_native_packager_hostname", "localhost"
        }
        release {
            // Use default debug signing for now
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")
    
    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}

apply from: file("../../node_modules/@react-native-community/cli-platform-android/native_modules.gradle"); applyNativeModulesAppBuildGradle(project)

