// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    // CRITICAL: Set minSdkVersion FIRST before anything else
    // This ensures CMake reads the correct value
    project.ext.set("minSdkVersion", 23)
    System.setProperty("ANDROID_MIN_SDK_VERSION", "23")
    
    ext {
        buildToolsVersion = "34.0.0"
        minSdkVersion = 23  // Must be 23 for React Native 0.74 and react-native-screens
        compileSdkVersion = 34
        targetSdkVersion = 34
        // NDK version - will auto-download if not found
        // If you get NDK errors, install via Android Studio SDK Manager
        ndkVersion = "26.1.10909125"
        kotlinVersion = "1.9.22"
        kotlin_version = "1.9.22"  // For react-native-camera-kit
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.3.0")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

allprojects {
    repositories {
        maven {
            // All of React Native (JS, Obj-C sources, Android binaries) is installed from npm
            url("$rootDir/../node_modules/react-native/android")
        }
        maven {
            // Android JSC is installed from npm
            url("$rootDir/../node_modules/jsc-android/dist")
        }
        google()
        mavenCentral()
    }
    
    // Configure Kotlin compiler globally to suppress internal API errors
    afterEvaluate { project ->
        tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
            kotlinOptions {
                jvmTarget = "17"
                freeCompilerArgs += [
                    "-Xopt-in=kotlin.RequiresOptIn",
                    "-Xsuppress-version-warnings",
                    "-Xallow-unstable-dependencies",
                    "-Xskip-prerelease-check",
                    "-Xjvm-default=all"
                ]
                allWarningsAsErrors = false
            }
        }
        
        // Ensure all Android projects use minSdkVersion 23 (required for React Native 0.74)
        if (project.hasProperty('android')) {
            project.android {
                // Force minSdkVersion 23 for ALL projects including app
                // This ensures CMake reads the correct value
                // IMPORTANT: Set this BEFORE any other configuration to ensure it's applied first
                afterEvaluate {
                    defaultConfig {
                        minSdkVersion 23  // Force 23 for React Native 0.74 compatibility
                    }
                }
                defaultConfig {
                    minSdkVersion 23  // Force 23 for React Native 0.74 compatibility
                }
                // For react-native-screens CMake configuration - ensure minSdkVersion 23
                if (project.name == 'react-native-screens') {
                    afterEvaluate {
                        defaultConfig {
                            minSdkVersion 23  // Explicitly override to 23
                            // CMake needs ANDROID_PLATFORM to match minSdkVersion
                            // Platform 23 corresponds to Android 6.0 (API 23)
                            externalNativeBuild {
                                cmake {
                                    arguments "-DANDROID_STL=c++_shared",
                                            "-DRNS_NEW_ARCH_ENABLED=${project.hasProperty('newArchEnabled') ? project.newArchEnabled : 'false'}",
                                            "-DANDROID_PLATFORM=android-23",  // Force platform 23
                                            "-DANDROID_MIN_SDK_VERSION=23"  // Explicitly set for CMake
                                }
                            }
                        }
                    }
                    defaultConfig {
                        minSdkVersion 23  // Explicitly override to 23
                        // CMake needs ANDROID_PLATFORM to match minSdkVersion
                        // Platform 23 corresponds to Android 6.0 (API 23)
                        externalNativeBuild {
                            cmake {
                                arguments "-DANDROID_STL=c++_shared",
                                        "-DRNS_NEW_ARCH_ENABLED=${project.hasProperty('newArchEnabled') ? project.newArchEnabled : 'false'}",
                                        "-DANDROID_PLATFORM=android-23",  // Force platform 23
                                        "-DANDROID_MIN_SDK_VERSION=23"  // Explicitly set for CMake
                            }
                        }
                    }
                }
            }
        }
        
        // Fix NDK source.properties issue for react-native-worklets-core
        if (project.name == 'react-native-worklets-core') {
            if (project.hasProperty('android')) {
                project.android {
                    ndkVersion rootProject.ext.ndkVersion
                }
            }
        }
    }
}

